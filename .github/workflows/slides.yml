name: Publicar slides en GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "slides/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slides

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "slides/uv.lock"

      - name: Instalar dependencias
        run: uv sync --frozen

      - name: Generar sitio estático
        run: uv run mkslides build docs/index.md --site-dir ../site

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Publicar en GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
