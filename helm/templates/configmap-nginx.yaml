apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "application.fullname" . }}-nginx
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
data:
  UPSTREAM_HOST: localhost:{{ .Values.app.port }}
{{- with .Values.nginx.env }}
  {{- toYaml . | nindent 2 }}
{{- end }}
