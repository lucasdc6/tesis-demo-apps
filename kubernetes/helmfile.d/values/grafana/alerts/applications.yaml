apiVersion: 1
groups:
    - orgId: 1
      name: default
      folder: Applications
      interval: 1m
      rules:
        - uid: bfknkw84f0g00f
          title: Errors
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 1800
                to: 0
              datasourceUid: prom
              model:
                datasource:
                    type: prometheus
                    uid: prom
                editorMode: code
                exemplar: true
                expr: sum(rate(traces_spanmetrics_calls{http_status_code=~"5..", span_name="/"}[2m])) by(service_name, http_status_code)
                instant: false
                interval: ""
                intervalMs: 15000
                legendFormat: '{{http_status_code}}'
                maxDataPoints: 43200
                range: true
                refId: A
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          dashboardUid: glknq9
          panelId: 2
          noDataState: NoData
          execErrState: Error
          for: 1m
          annotations:
            __dashboardUid__: glknq9
            __panelId__: "2"
            dashboard_url: https://grafana.tesis.lucasdc.ar/d/glknq9/application?viewPanel=2&var-service_name={{ $labels.service_name }}
          labels: {}
          isPaused: false
          notification_settings:
            receiver: empty
