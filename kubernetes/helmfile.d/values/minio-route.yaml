resources:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: minio
    spec:
      hostnames:
      - minio.localhost
      parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: nginx
        namespace: nginx-gateway
        sectionName: http
      rules:
      - backendRefs:
        - group: ""
          kind: Service
          name: minio-console
          port: 9001
          weight: 1
        matches:
        - path:
            type: PathPrefix
            value: /