global:
  nodeSelector: {}
  tolerations: []

persistence:
  enabled: true
  size: 10Gi
service:
  type: ClusterIP
storageClass:
  reclaimPolicy: Retain
  mountOptions:
    - "vers=4.1"
    - retrans=2
    - timeo=30

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

