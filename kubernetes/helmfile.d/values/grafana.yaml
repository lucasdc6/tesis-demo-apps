---
route:
  main:
    enabled: true
    hostnames:
      - grafana.localhost
    parentRefs:
      - name: nginx
        namespace: nginx-gateway
        sectionName: http

env:
  GF_AUTH_ANONYMOUS_ENABLED: "true"
  GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
  GF_AUTH_DISABLE_LOGIN_FORM: "true"
  GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor traceQLStreaming metricsSummary"

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        url: http://loki-gateway.loki
        isDefault: false
      - name: Mimir
        uid: prom
        type: prometheus
        url: http://mimir-gateway.mimir/prometheus
        isDefault: true
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo-query-frontend.tempo:3200
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          lokiSearch:
            datasourceUid: loki
          tracesToMetrics:
            datasourceUid: prom
          serviceMap:
            datasourceUid: prom