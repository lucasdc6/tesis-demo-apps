bases:
  - ./bases/repositories.yaml
---
releases:
  - name: grafana
    namespace: grafana
    chart: grafana-community/grafana
    values:
      - values/grafana.yaml
  - name: minio
    namespace: minio
    chart: minio/minio
    values:
      - values/minio.yaml
  - name: minio-route
    namespace: minio
    chart: bedag/raw
    values:
      - values/minio-route.yaml
  - name: mimir
    namespace: mimir
    chart: grafana/mimir-distributed
    values:
      - values/mimir.yaml
    needs:
      - minio/minio
  - name: loki
    namespace: loki
    chart: grafana/loki
    values:
      - values/loki.yaml
    needs:
      - minio/minio
  - name: tempo
    namespace: tempo
    chart: grafana-community/tempo-distributed
    values:
      - values/tempo.yaml
  - name: kube-state-metrics
    namespace: kube-state-metrics
    chart: prometheus-community/kube-state-metrics
    version: 7.2.*
    values:
      - values/kube-state-metrics.yaml
  - name: opentelemetry-collector
    namespace: opentelemetry
    chart: open-telemetry/opentelemetry-collector
    version: 0.146.1
    values:
      - values/opentelemetry.yaml
