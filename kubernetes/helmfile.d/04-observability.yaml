bases:
  - ./bases/repositories.yaml
  - ./bases/environments.yaml
---
releases:
  - name: grafana
    namespace: grafana
    chart: grafana-community/grafana
    version: 11.3.*
    values:
      - values/grafana/values.yaml
      - values/grafana/values.yaml.gotmpl
  - name: minio
    namespace: minio
    chart: minio/minio
    version: 5.4.*
    values:
      - values/minio/values.yaml
  - name: minio-route
    namespace: minio
    chart: bedag/raw
    version: 2.0.*
    values:
      - values/minio/route.yaml.gotmpl
  - name: mimir
    namespace: mimir
    chart: grafana/mimir-distributed
    version: 6.0.*
    values:
      - values/mimir/values.yaml
    needs:
      - minio/minio
  - name: loki
    namespace: loki
    chart: grafana/loki
    version: 6.55.*
    values:
      - values/loki/values.yaml
    needs:
      - minio/minio
  - name: tempo
    namespace: tempo
    chart: grafana-community/tempo-distributed
    version: 2.6.*
    values:
      - values/tempo/values.yaml
  - name: kube-state-metrics
    namespace: kube-state-metrics
    chart: prometheus-community/kube-state-metrics
    version: 7.2.*
    values:
      - values/kube-state-metrics/values.yaml
  - name: opentelemetry-collector
    namespace: opentelemetry
    chart: open-telemetry/opentelemetry-collector
    version: 0.147.*
    values:
      - values/opentelemetry/values.yaml
