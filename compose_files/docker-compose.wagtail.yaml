---
volumes:
  wagtail:
  wagtail_public:
  wagtail_db:

networks:
  app:
  backend:
  observability:

services:
  wagtail: &wagtail
    image: wagtail
    build:
      context: ..
      dockerfile: container_files/Containerfile.wagtail
      target: wagtail
    environment:
      DJANGO_SECRET_KEY: changeme
      DATABASE_URL: postgres://wagtail:wagtail-password@pg-db/wagtail
      REDIS_URL: redis://redis
      DJANGO_SETTINGS_MODULE: bakerydemo.settings.custom
      OTEL_SERVICE_NAME: wagtail-demo
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_PYTHON_LOG_CORRELATION: true
      OTEL_PYTHON_LOG_FORMAT: "%(msg)s [span_id=%(span_id)s]"
      OTEL_PYTHON_LOG_LEVEL: debug
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: true
    volumes:
      - wagtail:/app/bakerydemo
      - wagtail_public:/app/bakerydemo/media
    networks:
      - app
      - backend
      - observability

  wagtail-migrations:
    <<: *wagtail
    ports: []
    command:
      - wagtail-migrate
    networks:
      - app
      - backend
      - observability

  wagtail-nginx:
    image: wagtail-nginx
    build:
      context: ..
      dockerfile: container_files/Containerfile.wagtail
      target: nginx
    environment:
      UPSTREAM_HOST: wagtail:8000
    volumes:
      - wagtail:/app/bakerydemo:ro
      - wagtail_public:/app/bakerydemo/media:ro
    networks:
      - app

  pg-db:
    image: postgres:14.1
    environment:
      POSTGRES_DB: wagtail
      POSTGRES_USER: wagtail
      POSTGRES_PASSWORD: wagtail-password
    volumes:
      - wagtail_db:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:6.2
    networks:
      - backend